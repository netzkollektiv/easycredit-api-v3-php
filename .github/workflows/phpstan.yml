name: PHPStan Static Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  phpstan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: [8.4]
        config:
          - phpstan.neon        # PHP 7.1 compatibility
          - phpstan-php85.neon  # PHP 8.5 compatibility

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, xml, json
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan (${{ matrix.config }})
        run: vendor/bin/phpstan analyse --no-progress --configuration=${{ matrix.config }}

